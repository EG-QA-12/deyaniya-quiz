  <line x1="115" y1="115" x2="155" y2="115" stroke="#c9a84c" stroke-width="0.5" opacity="0.3"/>
  <line x1="45" y1="135" x2="155" y2="135" stroke="#c9a84c" stroke-width="0.5" opacity="0.3"/>
  <line x1="45" y1="155" x2="155" y2="155" stroke="#c9a84c" stroke-width="0.5" opacity="0.3"/>
</svg>